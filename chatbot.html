<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ChatBot</title>
<link rel="icon" href="favicon.ico">
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests; connect-src http://127.0.0.1:11434 http://localhost:11434;">
<link rel="stylesheet" href="chatbot.css">
</head>
<body>

<div id="loadingScreen">
  <div class="loading-inner">
    <div class="spinner"></div>
    <p id="loadingText">Starting…</p>
    <div id="loadingActions">
      <button id="retryBtn" class="loading-btn">Retry</button>
    </div>
  </div>
</div>

<div id="appRoot" class="hidden">

<header>
  <div class="brand"><span class="dot"></span>ChatBot</div>
  <div class="header-controls">
    <select id="modelSelect"><option>Loading models…</option></select>
    <button class="icon-btn" id="settingsBtn" title="Settings">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>
  </div>
</header>

<div id="settingsPanel">
  <label>Ollama URL</label>
  <input type="text" id="ollamaUrl" value="http://localhost:11434">
  <div class="hint">If models fail to load, run Ollama with <code>OLLAMA_ORIGINS=*</code> set so this page is allowed to reach it.</div>
</div>

<div id="messages">
  <div class="empty-state" id="emptyState">
    <div class="dot"></div>
    <h2>Welcome to ChatBot</h2>
    <p>Ask anything — everything runs locally through Ollama.</p>
  </div>
</div>

<div class="composer-wrap">
  <div class="composer" id="composer">
    <div class="chips" id="chips"></div>
    <div class="composer-row">
      <textarea id="promptInput" placeholder="Ask something…" rows="1"></textarea>
      <button id="sendBtn" title="Send">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5"></path><path d="M5 12l7-7 7 7"></path></svg>
      </button>
    </div>
  </div>
  <div class="status-line" id="statusLine"></div>
</div>

</div>

<script src="loading.js"></script>
<script src="chatbot.js"></script>
</body>
</html>
